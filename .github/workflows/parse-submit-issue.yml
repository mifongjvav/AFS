name: Parse submit issue with status support (robust parsing)

on:
  issues:
    types:
      - opened
      - edited
  issue_comment:
    types:
      - created

permissions:
  issues: write
  contents: write

concurrency:
  group: submit-issue-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  handle-submit-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Handle submit issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fs = require('fs');

            const isIssueEvent = !!context.payload.issue && !context.payload.comment;
            const isCommentEvent = !!context.payload.comment;

            const allowedFileHosts = new Set([
              'user-images.githubusercontent.com',
              'github.com',
              'githubusercontent.com'
            ]);

            function normalizeKey(k) {
              if (!k) return '';
              return String(k)
                .replace(/（.*?）/g, '')
                .replace(/\(.*?\)/g, '')
                .replace(/\u3000/g, ' ')
                .trim();
            }

            function escapeHtml(s) {
              return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
            }

            function safeText(s, maxLen = 2000) {
              return String(s ?? '')
                .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, '')
                .trim()
                .slice(0, maxLen);
            }

            function safeTag(t) {
              return safeText(t, 80)
                .replace(/[^\p{L}\p{N}\s._\-·•/()（）,，]/gu, '')
                .trim();
            }

            function isPrivateIPv4(host) {
              if (!/^\d{1,3}(\.\d{1,3}){3}$/.test(host)) return false;
              const parts = host.split('.').map(n => Number(n));
              if (parts.some(n => Number.isNaN(n) || n < 0 || n > 255)) return true;
              return (
                parts[0] === 10 ||
                (parts[0] === 127) ||
                (parts[0] === 192 && parts[1] === 168) ||
                (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) ||
                (parts[0] === 169 && parts[1] === 254)
              );
            }

            function safeHttpUrl(raw) {
              const s = safeText(raw, 4000);
              try {
                const u = new URL(s);
                if (!['http:', 'https:'].includes(u.protocol)) return '';
                const host = u.hostname.toLowerCase();
                if (
                  host === 'localhost' ||
                  host.endsWith('.localhost') ||
                  host === '127.0.0.1' ||
                  host === '::1' ||
                  isPrivateIPv4(host)
                ) return '';
                return u.toString();
              } catch {
                return '';
              }
            }

            function parseBlockToKV(block) {
              const kv = {};
              block.split(/\r?\n/)
                .map(l => l.trim())
                .filter(Boolean)
                .forEach(line => {
                  let i = line.indexOf('：');
                  if (i === -1) i = line.indexOf(':');
                  if (i > -1) {
                    const rawKey = line.slice(0, i).trim();
                    const rawVal = line.slice(i + 1).trim();
                    const key = normalizeKey(rawKey);
                    kv[key] = rawVal;
                  }
                });
              return kv;
            }

            function makePicker(kv) {
              return function pick(...keys) {
                for (const k of keys) {
                  const nk = normalizeKey(k);
                  if (kv[nk] !== undefined) return safeText(kv[nk]);
                }
                return '';
              };
            }

            function extractBodyBlock(body, markerTitle) {
              const marker = `[${markerTitle}]`;
              const endMarker = '[END]';
              let block = body || '';
              const s = block.indexOf(marker);
              const e = block.indexOf(endMarker);
              if (s !== -1 && e !== -1 && e > s) {
                block = block.slice(s + marker.length, e);
              }
              return block;
            }

            function extractGitHubAttachmentUrls(body) {
              const urls = new Set();

              for (const m of String(body || '').matchAll(/\((https?:\/\/[^)\s]+)\)/g)) {
                urls.add(m[1]);
              }

              for (const m of String(body || '').matchAll(/(?:src|href)=["'](https?:\/\/[^"']+)["']/g)) {
                urls.add(m[1]);
              }

              return [...urls]
                .map(u => u.trim().replace(/[)"'>]+$/, ''))
                .map(u => safeHttpUrl(u))
                .filter(Boolean)
                .filter(u => {
                  try {
                    const host = new URL(u).hostname.toLowerCase();
                    return allowedFileHosts.has(host) || host.endsWith('.githubusercontent.com');
                  } catch {
                    return false;
                  }
                });
            }

            function dedupe(arr) {
              return [...new Set(arr)];
            }

            async function upsertJsonFile(path, dataObj) {
              const content = Buffer.from(JSON.stringify(dataObj, null, 2) + '\n', 'utf8').toString('base64');
              let sha = undefined;
              try {
                const existing = await github.rest.repos.getContent({ owner, repo, path });
                if (Array.isArray(existing.data)) {
                  throw new Error(`Target path is a directory: ${path}`);
                }
                sha = existing.data.sha;
              } catch (err) {
                if (err.status !== 404) throw err;
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                message: `chore: update submission json for issue #${context.payload.issue.number}`,
                content,
                sha
              });
            }

            /* =================================================
               评论事件：@bot 且 状态=制作中 → 提醒仓库所有者
            ================================================= */
            if (isCommentEvent) {
              const issue = context.payload.issue;
              const comment = context.payload.comment;

              if ((issue.title || '').trim() !== '[提交请求]') return;
              if (comment.user?.type === 'Bot') return;
              if (!comment.body.includes('@github-actions')) return;

              const body = issue.body || '';
              const block = extractBodyBlock(body, '提交请求');
              const kv = parseBlockToKV(block);
              const pick = makePicker(kv);
              const statusRaw = pick('状态', '状态（制作中 | 待定）');
              const status = statusRaw || '待定';

              if (status === '制作中') {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `⚠️ @${owner} 当前提交状态为 **制作中**，请确认是否需要调整为 **待定**。`
                });
              }
              return;
            }

            /* ===============================
               Issue 事件：解析 + 校验 + JSON
            =============================== */
            const issue = context.payload.issue;
            const issueNumber = issue.number;

            if ((issue.title || '').trim() !== '[提交请求]') return;

            const body = issue.body || '';
            const block = extractBodyBlock(body, '提交请求');
            const kv = parseBlockToKV(block);
            const pick = makePicker(kv);

            const title = pick('标题', 'title');
            const desc = pick('简介', '描述', 'description');
            const link = pick('链接地址', '链接', 'link');
            const type = pick('获取方式', '获取方式（jump | copy | download）', 'type');

            const statusRaw = pick('状态', '状态（制作中 | 待定）');
            const status = statusRaw || '待定';

            const icon = pick('FontAwesome icon（留空为默认，格式为fas fa-图标名称）', 'icon');
            const author = pick('作者', '原作者', 'author');
            const linkText = pick('获取按钮昵称', '获取按钮', 'linkText');
            const tags = pick('标签（多个标签用英文逗号分隔）', '标签', 'class', 'tags');

            const errors = [];

            if (!title) errors.push('缺少必填字段：标题');
            if (!desc) errors.push('缺少必填字段：简介');
            if (!link) errors.push('缺少必填字段：链接地址');
            if (!type || !['jump', 'copy', 'download'].includes(type.toLowerCase())) {
              errors.push('获取方式必须是 jump / copy / download');
            }
            if (!['待定', '制作中'].includes(status)) {
              errors.push('状态只能是：待定 或 制作中');
            }

            const safeLink = safeHttpUrl(link);
            if (!safeLink) {
              errors.push('链接地址必须是可访问的 http(s) URL，且不能指向本机或内网地址');
            }

            const sanitizedTags = [];
            const forbidden = [
              'invalid',
              '坟场',
              '过审',
              '上架',
              '用户喜爱',
              '制作中',
              '待定'
            ];

            if (tags) {
              tags
                .split(',')
                .map(t => safeTag(t))
                .filter(t => t && !forbidden.includes(t))
                .forEach(t => sanitizedTags.push(t));
            }

            if (errors.length > 0) {
              const labelNames = issue.labels.map(l => l.name);
              if (!labelNames.includes('invalid')) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['invalid']
                });
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: [
                  '❌ **提交内容校验失败**',
                  '',
                  ...errors.map((e, i) => `${i + 1}. ${e}`),
                  '',
                  '请修正后编辑 issue，系统会自动重新校验。',
                  '',
                  '参考格式（支持括号说明）：',
                  '```',
                  '[提交请求]',
                  '标题：示例标题',
                  '简介：示例简介（支持括号说明）',
                  '链接地址：https://example.com',
                  '获取方式（jump | copy | download）：download',
                  '状态（制作中 | 待定）：待定',
                  '获取按钮昵称：立即获取',
                  '标签（多个标签用英文逗号分隔）：工具,网络',
                  '[END]',
                  '```'
                ].join('\n')
              });
              return;
            }

            const safeIcon = /^fas\s+fa-[a-z0-9-]+$/i.test(safeText(icon, 80)) ? safeText(icon, 80) : 'fas fa-file';

            const attachments = dedupe(extractGitHubAttachmentUrls(body)).slice(0, 20);

            const submission = {
              schema: 'submit-request/v2',
              issueNumber,
              title: safeText(title, 120),
              icon: safeIcon,
              description: safeText(desc, 5000),
              author: safeText(author, 120),
              url: safeLink,
              linkText: safeText(linkText, 120),
              type: type.toLowerCase(),
              status,
              tags: sanitizedTags,
              attachments,
              processedAt: new Date().toISOString()
            };

            const repoPath = `data/submissions/issue-${issueNumber}.json`;
            await upsertJsonFile(repoPath, submission);

            // 处理用的安全结果：所有用户内容都已做转义/白名单限制
            const result = {
              title: submission.title,
              icon: submission.icon,
              description: `<p>原作者：${escapeHtml(submission.author)}</p><p>${escapeHtml(submission.description)}</p>`,
              url: submission.url,
              linkText: submission.linkText,
              type: submission.type,
              class: [...submission.tags, submission.status],
              attachments: submission.attachments
            };

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              labels: issue.labels
                .map(l => l.name)
                .filter(l => !forbidden.includes(l))
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: [
                `✅ 提交解析完成（状态：${status}）`,
                `已安全提交到仓库：\`${repoPath}\``,
                '```json',
                JSON.stringify(result, null, 2),
                '```'
              ].join('\n')
            });
