name: Submit To AFS

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: afs-json
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse Issue
        id: parse
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const body = context.payload.issue.body || "";

            function get(name){
              const m = body.match(
                new RegExp(`### ${name}[\\r\\n]+([\\s\\S]*?)(?=\\n### |$)`)
              );
              return m ? m[1].trim() : "";
            }

            const data = {
              title: get("标题"),
              icon: get("图标"),
              description: get("描述"),
              link: get("链接"),
              linkText: get("按钮文字"),
              type: get("类型"),
              class: get("分类")
                .split(",")
                .map(x=>x.trim())
                .filter(Boolean)
            };

            return JSON.stringify(data);

      - name: Update AFS.json
        uses: actions/github-script@v8
        env:
          DATA: ${{ steps.parse.outputs.result }}
        with:
          script: |
            const fs = require("fs");

            const data = JSON.parse(process.env.DATA);

            if (!data.title)
              throw new Error("标题不能为空");

            const allowedTypes = [
              "jump",
              "copy",
              "download"
            ];

            if (!allowedTypes.includes(data.type))
              throw new Error("非法类型");

            if (
              !/^https?:\/\//i.test(data.link)
            ){
              throw new Error("非法链接");
            }

            const file = "AFS.json";

            let afs = [];

            if (fs.existsSync(file)) {
              afs = JSON.parse(
                fs.readFileSync(file, "utf8")
              );
            }

            afs.push({
              title: data.title,
              icon: data.icon,
              description: data.description,
              link: data.link,
              linkText: data.linkText,
              type: data.type,
              class: data.class
            });

            fs.writeFileSync(
              file,
              JSON.stringify(afs, null, 2),
              "utf8"
            );

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add AFS.json

          git diff --cached --quiet && exit 0

          git commit -m "Add item from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ 已成功添加到 AFS.json"
            });

      - name: Close Issue
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
